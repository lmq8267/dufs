    <title>Dufs 配置生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --bg-gradient: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            animation: gradientShift 10s ease infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            }

            50% {
                background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 3rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.2rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            animation: fadeIn 1s ease;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
        }

        .form-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            cursor: help;
            position: relative;
        }

        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            margin-bottom: 5px;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.9);
        }

        label:hover .tooltip {
            opacity: 1;
        }

        input[type="text"],
        input[type="number"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .auth-item {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-success {
            background: var(--success-gradient);
            color: white;
        }

        .btn-danger {
            background: var(--secondary-gradient);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .config-output {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .add-btn {
            background: var(--success-gradient);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden-input {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Dufs 配置生成器</h1>
            <p class="subtitle">可视化生成 Dufs 文件服务器配置文件</p>
        </header>

        <main class="main-content">
            <section class="card">
                <form id="configForm">
                    <!-- 基础配置 -->
                    <div class="form-section">
                        <h3 class="section-title">基础配置</h3>

                        <div class="form-group">
                            <label>
                                服务路径
                                <span class="tooltip">指定要服务的目录路径，默认为当前目录</span>
                            </label>
                            <input type="text" id="servePath" value="." placeholder="例如: /var/www 或 .">
                        </div>

                        <div class="form-group">
                            <label>
                                路径前缀
                                <span class="tooltip">URL路径前缀，用于反向代理场景</span>
                            </label>
                            <input type="text" id="pathPrefix" placeholder="例如: /dufs">
                        </div>
                    </div>

                    <!-- 网络配置 -->
                    <div class="form-section">
                        <h3 class="section-title">网络配置</h3>

                        <div class="form-group">
                            <label>
                                绑定地址
                                <span class="tooltip">服务器监听的IP地址，多个地址用逗号分隔留空将同时监听 IPv4 (0.0.0.0) 和 IPv6 (::)</span>
                            </label>
                            <input type="text" id="bind" placeholder="例如: 0.0.0.0,:: 或 127.0.0.1 或 192.168.1.1">
                        </div>

                        <div class="form-group">
                            <label>
                                端口
                                <span class="tooltip">服务器监听端口，默认为5000</span>
                            </label>
                            <input type="number" id="port" value="5000" min="1" max="65535">
                        </div>

                        <div class="form-group">
                            <label>
                                TLS证书路径
                                <span class="tooltip">HTTPS证书文件路径（可选）</span>
                            </label>
                            <input type="text" id="tlsCert" placeholder="例如: /path/to/cert.pem">
                        </div>

                        <div class="form-group">
                            <label>
                                TLS私钥路径
                                <span class="tooltip">HTTPS私钥文件路径（可选）</span>
                            </label>
                            <input type="text" id="tlsKey" placeholder="例如: /path/to/key.pem">
                        </div>
                    </div>

                    <!-- 权限配置 -->
                    <div class="form-section">
                        <h3 class="section-title">权限配置</h3>

                        <div class="checkbox-group">
                            <input type="checkbox" id="allowAll">
                            <label for="allowAll">
                                允许所有操作
                                <span class="tooltip">允许上传、删除、搜索等所有操作</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="allowUpload">
                            <label for="allowUpload">
                                允许上传
                                <span class="tooltip">允许上传文件和文件夹</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="allowDelete">
                            <label for="allowDelete">
                                允许删除
                                <span class="tooltip">允许删除文件和文件夹</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="allowSearch">
                            <label for="allowSearch">
                                允许搜索
                                <span class="tooltip">允许搜索文件和文件夹</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="allowSymlink">
                            <label for="allowSymlink">
                                允许符号链接
                                <span class="tooltip">允许访问根目录外的符号链接</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="allowArchive">
                            <label for="allowArchive">
                                允许归档下载
                                <span class="tooltip">允许下载文件夹为压缩包</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="allowHash">
                            <label for="allowHash">
                                允许哈希查询
                                <span class="tooltip">允许通过 ?hash 查询获取文件的 sha256 哈希值</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="enableCors">
                            <label for="enableCors">
                                启用CORS
                                <span class="tooltip">启用跨域资源共享</span>
                            </label>
                        </div>
                    </div>

                    <!-- 访问控制 -->
                    <div class="form-section">
                        <h3 class="section-title">访问控制</h3>

                        <div class="form-group">
                            <label>
                                隐藏路径
                                <span class="tooltip">从目录列表中隐藏的路径，支持glob模式</span>
                            </label>
                            <input type="text" id="hidden" placeholder="例如: tmp,*.log,*.lock">
                        </div>


                        <div class="form-group">
                            <label>
                                认证规则（账户留空则为访客，rw为读写 ro为只读，访客谨慎设为rw）
                                <span
                                    class="tooltip">用户认证规则，格式：user:pass@/path:rw,/other:ro。支持匿名用户（留空用户名密码）和哈希密码（$6$开头）</span>
                            </label>
                            <div id="authRules">
                                <div class="auth-item">
                                    <input type="text" placeholder="用户名（留空为匿名）" class="auth-user">
                                    <input type="password" placeholder="密码（留空为匿名，支持$6$开头的sha512哈希）" class="auth-pass">
                                    <input type="text" placeholder="路径:权限，如 /etc:rw,/tmp:ro 多个使用英文逗号分隔"
                                        class="auth-path">
                                    <button type="button" class="btn btn-small btn-danger"
                                        onclick="removeAuthRule(this)">删除</button>
                                </div>
                            </div>
                            <button type="button" class="add-btn" onclick="addAuthRule()">+ 添加认证规则</button>
                        </div>
                    </div>

                    <!-- 渲染选项 -->
                    <div class="form-section">
                        <h3 class="section-title">渲染选项</h3>

                        <div class="checkbox-group">
                            <input type="checkbox" id="renderIndex">
                            <label for="renderIndex">
                                渲染索引
                                <span class="tooltip">目录请求时返回index.html，不存在则404</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="renderTryIndex">
                            <label for="renderTryIndex">
                                尝试渲染索引
                                <span class="tooltip">目录请求时尝试返回index.html，失败则显示目录列表</span>
                            </label>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="renderSpa">
                            <label for="renderSpa">
                                SPA模式
                                <span class="tooltip">单页应用模式</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label>
                                资源目录
                                <span class="tooltip">自定义UI资源目录路径</span>
                            </label>
                            <input type="text" id="assets" placeholder="例如: ./assets">
                        </div>
                    </div>

                    <!-- 日志配置 -->
                    <div class="form-section">
                        <h3 class="section-title">日志配置</h3>

                        <div class="form-group">
                            <label>
                                日志格式 $remote_addr $request $status
                                <span class="tooltip">HTTP日志格式，支持变量如$remote_addr, $request等。默认格式：'$remote_addr
                                    "$request" $status'</span>
                            </label>
                            <input type="text" id="logFormat" placeholder='例如: [$remote_addr] [$request] [$status]'>
                        </div>

                        <div class="form-group">
                            <label>
                                日志文件
                                <span class="tooltip">日志文件路径，留空则输出到标准输出</span>
                            </label>
                            <input type="text" id="logFile" placeholder="例如: ./dufs.log">
                        </div>

                        <div class="form-group">
                            <label>
                                压缩级别
                                <span class="tooltip">ZIP压缩级别</span>
                            </label>
                            <select id="compress">
                                <option value="none">无压缩</option>
                                <option value="low" selected>低压缩</option>
                                <option value="medium">中等压缩</option>
                                <option value="high">高压缩</option>
                            </select>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary" onclick="generateConfig()">生成配置</button>
                </form>
            </section>

            <section class="card">
                <h3 class="section-title">生成的配置文件</h3>
                <div class="config-output" id="configOutput">
                    # 在左侧填写配置后点击"生成配置"按钮
                    # 配置将以YAML格式显示在这里
                </div>
                <div class="action-buttons">
                    <button class="btn btn-success" onclick="copyConfig()">
                        📋 复制配置
                    </button>
                    <button class="btn btn-primary" onclick="downloadConfig()">
                        💾 下载配置
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 添加认证规则  
        function addAuthRule() {
            const authRules = document.getElementById('authRules');
            const newRule = document.createElement('div');
            newRule.className = 'auth-item';
            newRule.innerHTML = `  
                <input type="text" placeholder="用户名（留空为匿名）" class="auth-user">  
                <input type="password" placeholder="密码（留空为匿名，支持$6$开头的sha512哈希）" class="auth-pass">  
                <input type="text" placeholder="路径权限，如 /:rw,/public:ro" class="auth-path">  
                <button type="button" class="btn btn-small btn-danger" onclick="removeAuthRule(this)">删除</button>  
            `;
            authRules.appendChild(newRule);
        }

        // 删除认证规则  
        function removeAuthRule(button) {
            const authRules = document.getElementById('authRules');
            if (authRules.children.length > 1) {
                button.parentElement.remove();
            } else {
                showMessage('至少需要保留一个认证规则配置项');
            }
        }

        // 生成配置  
        function generateConfig(shouldScroll = true) {
            const config = {};

            // 基础配置  
            const servePath = document.getElementById('servePath').value.trim();
            if (servePath && servePath !== '.') {
                config['serve-path'] = servePath;
            }

            const pathPrefix = document.getElementById('pathPrefix').value.trim();
            if (pathPrefix) {
                config['path-prefix'] = pathPrefix;
            }

            // 网络配置  
            const bind = document.getElementById('bind').value.trim();
            if (bind) {
                config.bind = bind.split(',').map(addr => addr.trim());
            }

            const port = parseInt(document.getElementById('port').value);
            if (port !== 5000) {
                config.port = port;
            }

            const tlsCert = document.getElementById('tlsCert').value.trim();
            const tlsKey = document.getElementById('tlsKey').value.trim();
            if (tlsCert || tlsKey) {
                if (tlsCert) config['tls-cert'] = tlsCert;
                if (tlsKey) config['tls-key'] = tlsKey;
            }

            // 权限配置  
            const permissions = {};
            if (document.getElementById('allowAll').checked) {
                config['allow-all'] = true;
            } else {
                if (document.getElementById('allowUpload').checked) permissions['allow-upload'] = true;
                if (document.getElementById('allowDelete').checked) permissions['allow-delete'] = true;
                if (document.getElementById('allowSearch').checked) permissions['allow-search'] = true;
                if (document.getElementById('allowSymlink').checked) permissions['allow-symlink'] = true;
                if (document.getElementById('allowArchive').checked) permissions['allow-archive'] = true;
                if (document.getElementById('allowHash').checked) permissions['allow-hash'] = true;
            }
            Object.assign(config, permissions);

            if (document.getElementById('enableCors').checked) {
                config['enable-cors'] = true;
            }

            // 访问控制  
            const hidden = document.getElementById('hidden').value.trim();
            if (hidden) {
                config.hidden = hidden.split(',').map(h => h.trim());
            }

            const authRules = [];
            document.querySelectorAll('.auth-item').forEach(item => {
                const user = item.querySelector('.auth-user').value.trim();
                const pass = item.querySelector('.auth-pass').value.trim();
                const path = item.querySelector('.auth-path').value.trim();

                if (path) {  // 只要路径不为空就生成规则  
                    if (user || pass) {
                        authRules.push(`${user}:${pass}@${path}`);
                    } else {
                        // 匿名用户，需要YAML引号  
                        authRules.push(`"@${path}"`);
                    }
                }
            });
            if (authRules.length > 0) {
                config.auth = authRules;
            }

            // 渲染选项  
            if (document.getElementById('renderIndex').checked) config['render-index'] = true;
            if (document.getElementById('renderTryIndex').checked) config['render-try-index'] = true;
            if (document.getElementById('renderSpa').checked) config['render-spa'] = true;

            const assets = document.getElementById('assets').value.trim();
            if (assets) config.assets = assets;

            // 日志配置  
            const logFormat = document.getElementById('logFormat').value.trim();
            if (logFormat) config['log-format'] = logFormat;

            const logFile = document.getElementById('logFile').value.trim();
            if (logFile) config['log-file'] = logFile;

            const compress = document.getElementById('compress').value;
            if (compress !== 'low') config.compress = compress;

            // 生成YAML  
            let yaml = '# Dufs 配置文件\n';
            yaml += '# 生成时间: ' + new Date().toLocaleString() + '\n\n';

            if (Object.keys(config).length === 0) {
                yaml += '# 使用默认配置\n# 所有参数将采用默认值';
            } else {
                yaml += objectToYaml(config, 0);
            }

            document.getElementById('configOutput').textContent = yaml;
            showMessage('配置生成成功！');

            if (shouldScroll) {
                // 滚动到输出区域（移动端兼容）
                const outputCard = document.getElementById('configOutput');
                if (outputCard) {
                    const offsetTop = outputCard.getBoundingClientRect().top + window.scrollY - Math.min(20, window.innerHeight * 0.05);
                    window.scrollTo({ top: offsetTop, behavior: 'smooth' });

                    // 高亮提示
                    outputCard.style.transition = 'box-shadow 0.3s ease';
                    outputCard.style.boxShadow = '0 0 30px rgba(102,126,234,0.6)';
                    setTimeout(() => { outputCard.style.boxShadow = ''; }, 1500);
                }
            }
        }

        // 配置项注释映射  
        const configComments = {
            'serve-path': '# 作为文件服务器的目录路径',
            'path-prefix': '# URL路径前缀，用于反向代理场景\n' +
                '#  - 作用：让dufs在子路径下运行，如 example.com/files/\n' +
                '#  - 处理：自动从请求路径中剥离前缀，生成正确的内部路径\n' +
                '#  - 影响：影响所有URL生成（资源链接、重定向、面包屑导航）\n' +
                '#  - 编码：特殊字符会自动URL编码（如空格变为%20）\n' +
                '#  - 示例：files 对应 /files/，api/v1 对应 /api/v1/',
            'bind': '# 文件服务器监听的IP地址，多个地址用逗号分隔',
            'port': '# 文件服务器监听端口，默认为5000',
            'tls-cert': '# HTTPS证书文件路径',
            'tls-key': '# HTTPS私钥文件路径',
            'hidden': '# 从目录列表中隐藏的路径和文件，支持glob模式\n' +
                '#  - 支持通配符：* (任意字符)、? (单个字符)\n' +
                '#  - 目录模式：以/结尾只匹配目录 (如 "tmp/")\n' +
                '#  - 常用模式：".git" (隐藏git目录)、"*.log" (隐藏日志文件)\n' +
                '#  - 多个模式：用逗号分隔 (如 "tmp,*.log,.*")',
            'auth': '# 用户认证规则。格式：user:pass@/path:rw,/path2:ro\n' +
                '#  - 匿名用户：@/path (所有人可访问)\n' +
                '#  - 多路径：用英文逗号分隔不同路径权限\n' +
                '#  - 权限：:rw(读写) 或 :ro(只读，可省略)\n' +
                '#  - 哈希密码：支持$6$开头的sha512哈希',
            'allow-all': '# 允许所有操作（上传、删除、搜索等）',
            'allow-upload': '# 允许上传文件和文件夹',
            'allow-delete': '# 允许删除文件和文件夹',
            'allow-search': '# 允许搜索文件和文件夹',
            'allow-symlink': '# 允许访问根目录外的符号链接',
            'allow-archive': '# 允许下载文件夹为压缩包',
            'allow-hash': '# 允许通过 ?hash 查询获取文件的 sha256 哈希值',
            'enable-cors': '# 启用跨域资源共享',
            'render-index': '# 目录请求时返回index.html，不存在则404',
            'render-try-index': '# 目录请求时尝试返回index.html，失败则显示目录列表',
            'render-spa': '# 单页应用模式',
            'assets': '# 自定义前端UI资源目录路径',
            'log-format': '# HTTP日志格式，支持变量如$remote_addr, $request等',
            'log-file': '# 日志文件路径，去掉此项则输出到标准输出',
            'compress': '# ZIP压缩级别（none/low/medium/high）'
        };

        // 对象转YAML（带注释）  
        function objectToYaml(obj, indent) {
            let yaml = '';
            const spaces = '  '.repeat(indent);

            for (const [key, value] of Object.entries(obj)) {
                // 添加注释  
                if (configComments[key]) {
                    yaml += `${spaces}${configComments[key]}\n`;
                }

                if (Array.isArray(value)) {
                    yaml += `${spaces}${key}:\n`;
                    value.forEach(item => {
                        yaml += `${spaces}  - ${item}\n`;
                    });
                } else if (typeof value === 'object' && value !== null) {
                    yaml += `${spaces}${key}:\n`;
                    yaml += objectToYaml(value, indent + 1);
                } else {
                    yaml += `${spaces}${key}: ${value}\n`;
                }
                yaml += '\n'; // 添加空行分隔  
            }

            return yaml;
        }

        function copyConfig() {
            const el = document.getElementById('configOutput');
            if (!el) return;

            // 获取文本内容（兼容 div / pre / textarea）
            const text = el.value !== undefined ? el.value : el.innerText;

            // ✅ 优先使用现代 Clipboard API（HTTPS 下可用）
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showMessage('已复制到剪贴板');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }

            // 🔁 兜底复制方案（兼容安卓 / iOS 老版本）
            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;

                // 防止页面滚动
                textarea.style.position = 'fixed';
                textarea.style.top = '0';
                textarea.style.left = '0';
                textarea.style.opacity = '0';
                textarea.style.pointerEvents = 'none';

                document.body.appendChild(textarea);

                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, textarea.value.length);

                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        showMessage('已复制到剪贴板');
                    } else {
                        showMessage('复制失败，请手动长按复制');
                    }
                } catch (err) {
                    showMessage('复制失败，请手动长按复制');
                }

                document.body.removeChild(textarea);
            }
        }

        // 下载配置  
        function downloadConfig() {
            const configText = document.getElementById('configOutput').textContent;
            const blob = new Blob([configText], { type: 'text/yaml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dufs-config.yaml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showMessage('配置文件下载中...');
        }

        // 显示消息  
        function showMessage(message) {
            // 创建消息元素  
            const messageEl = document.createElement('div');
            messageEl.style.cssText = `  
                position: fixed;  
                top: 20px;  
                right: 20px;  
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
                color: white;  
                padding: 15px 25px;  
                border-radius: 10px;  
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);  
                z-index: 10000;  
                animation: slideIn 0.3s ease;  
                font-weight: 500;  
            `;
            messageEl.textContent = message;

            // 添加动画样式  
            const style = document.createElement('style');
            style.textContent = `  
                @keyframes slideIn {  
                    from { transform: translateX(100%); opacity: 0; }  
                    to { transform: translateX(0); opacity: 1; }  
                }  
                @keyframes slideOut {  
                    from { transform: translateX(0); opacity: 1; }  
                    to { transform: translateX(100%); opacity: 0; }  
                }  
            `;
            document.head.appendChild(style);

            document.body.appendChild(messageEl);

            // 3秒后自动消失  
            setTimeout(() => {
                messageEl.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(messageEl);
                }, 300);
            }, 3000);
        }

        // 监听allow-all变化  
        document.getElementById('allowAll').addEventListener('change', function () {
            const allowCheckboxes = ['allowUpload', 'allowDelete', 'allowSearch', 'allowSymlink', 'allowArchive', 'allowHash'];
            allowCheckboxes.forEach(id => {
                const checkbox = document.getElementById(id);
                checkbox.disabled = this.checked;
                if (this.checked) {
                    checkbox.checked = false;
                }
            });
        });

        // 初始化时生成默认配置预览  
        window.addEventListener('load', function () {
            generateConfig(false);
        });  
    </script>
</body>

</html>
