name: 编译dufs（包括原版和主题美化版）

on:
#每天北京时间11点自动检测更新
  schedule:
   - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: '指定编译的版本号'
        required: false
        default: ''
      info:
        description: '发布Release的补充说明'
        required: false
        default: ''
      bj:
        description: '强制使用手动编译'
        required: true
        default: false
        type: boolean
permissions:
  contents: write
  actions: write
env:
  TZ: Asia/Shanghai
  CARGO_TERM_COLOR: always
  BJ: ${{ github.event.inputs.bj }}
  BRANCH: ${{ github.event.inputs.branch }}

jobs:
  check:
   runs-on: ubuntu-latest
   outputs:
     ver: ${{ steps.getversion.outputs.ver }}
     tag: ${{ steps.getversion.outputs.tag }}
   steps:
   - name: 检查更新
     id: getversion
     run: |
      ver=`curl https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest | jq -r '.tag_name'`
      tag=`curl https://api.github.com/repos/sigoden/dufs/releases/latest | jq -r '.tag_name'`
      echo "ver=${ver}" >> $GITHUB_OUTPUT
      echo "tag=${tag}" >> $GITHUB_OUTPUT
   -  name: 删除工作流
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        retain_days: 0
        keep_minimum_runs: 0

  version:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.setver.outputs.TAG }}
    steps:
      - name: 计算版本号
        id: setver
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.bj }}" == "true" ]]; then
            if [[ -n "${{ github.event.inputs.branch }}" ]]; then
              TAG="${{ github.event.inputs.branch }}"
            else
              TAG="${{ needs.check.outputs.tag }}"
            fi
          else
            TAG="${{ needs.check.outputs.tag }}"
          fi

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "最终版本号：$TAG"
        
  build-transparentlc-assets:
    needs: check
    if: ${{ github.event.inputs.bj == 'true' || (github.event.inputs.bj != 'true' && needs.check.outputs.ver != needs.check.outputs.tag) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          repository: TransparentLC/dufs-material-assets
          ref: master
      - name: Setup pnpm
        uses: pnpm/action-setup@master
        with:
          version: latest
      - name: Setup node
        uses: actions/setup-node@main
        with:
          node-version: latest
          check-latest: true
          cache: pnpm
          cache-dependency-path: "**/package.json"
      - name: Build assets
        run: |
          pnpm install
          DUFS_EMBED_FILENAME=1 pnpm run build
      - name: Upload assets
        uses: actions/upload-artifact@main
        with:
          name: dufs-transparentlc-assets
          path: dist

  build-cercky-assets:
    needs: check
    if: ${{ github.event.inputs.bj == 'true' || (github.event.inputs.bj != 'true' && needs.check.outputs.ver != needs.check.outputs.tag) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          repository: cercky/dufs_web
      - name: Build assets
        run: |
          mkdir -p dist
          cat assets/utils.js assets/auth.js assets/i18n.js assets/uploader.js assets/jszip.min.js assets/app.js > dist/index.js  
          cat assets/base.css assets/components.css > dist/index.css
          mv assets/index.html dist/index.html
          # 使用perl替换
          perl -i -pe 's|__ASSETS_PREFIX__base.css|__ASSETS_PREFIX__index.css|g' dist/index.html
          perl -i -ne 'print unless /__ASSETS_PREFIX__components.css/' dist/index.html
          perl -i -0pe 's/<script[^>]*__ASSETS_PREFIX__utils\.js[^>]*>.*?<\/script>\s*<script[^>]*__ASSETS_PREFIX__i18n\.js[^>]*>.*?<\/script>\s*<script[^>]*__ASSETS_PREFIX__auth\.js[^>]*>.*?<\/script>\s*<script[^>]*__ASSETS_PREFIX__uploader\.js[^>]*>.*?<\/script>\s*<script[^>]*__ASSETS_PREFIX__app\.js[^>]*>.*?<\/script>/<script src="__ASSETS_PREFIX__index.js"><\/script>/gs' dist/index.html
          perl -i -pe 's/<\/script><\/script>/<\/script>/g' dist/index.html
          cat dist/index.html
      - name: Upload assets
        uses: actions/upload-artifact@main
        with:
          name: dufs-cercky-assets
          path: dist

  package-assets:
    needs:
      - build-transparentlc-assets
      - build-cercky-assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main
        with:
          repository: sigoden/dufs
      - name: 下载 TransparentLC
        uses: actions/download-artifact@main
        with:
          name: dufs-transparentlc-assets
          path: transparentlc/dist

      - name: 打包 TransparentLC
        run: |
          cp -rf assets transparentlc/assets
          cd transparentlc
          mv -f dist/index.html assets/index.html
          mv -f dist/index.css assets/index.css
          mv -f dist/index.js assets/index.js
          tar -zcf ../dufs-assets-transparentlc.tar.gz assets

      - name: 下载 Cercky
        uses: actions/download-artifact@main
        with:
          name: dufs-cercky-assets
          path: cercky/dist

      - name: 打包 Cercky
        run: |
          cp -rf assets cercky/assets
          cd cercky
          mv -f dist/index.html assets/index.html
          mv -f dist/index.css assets/index.css
          mv -f dist/index.js assets/index.js
          tar -zcf ../dufs-assets-cercky.tar.gz assets

      - name: 上传资源包
        uses: actions/upload-artifact@main
        with:
          name: assets-pack
          path: |
            dufs-assets-transparentlc.tar.gz
            dufs-assets-cercky.tar.gz
  
  build-dufs:
    needs: 
     - build-transparentlc-assets
     - build-cercky-assets
     - package-assets
     - version
    name: 🛠 ${{ matrix.NAME }}
    strategy:
      fail-fast: false
      matrix:
        include:
        # 官方原版流程
        - target: aarch64-apple-darwin
          os: macos-latest
          NAME: dufs-aarch64-apple-darwin
          
        - target: aarch64-pc-windows-msvc
          os: windows-latest
          NAME: dufs-aarch64-pc-windows-msvc.exe
          
        - target: x86_64-apple-darwin
          os: macos-latest
          NAME: dufs-x86_64-apple-darwin
          
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          NAME: dufs-x86_64-pc-windows-msvc.exe
          
        - target: i686-pc-windows-msvc
          os: windows-latest
          NAME: dufs-i686-pc-windows-msvc.exe
          
        - target: aarch64-unknown-linux-musl
          os: ubuntu-latest
          URL: aarch64-linux-musl
          NAME: dufs-aarch64-linux-musl
          
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          URL: x86_64-linux-musl
          NAME: dufs-x86_64-linux-musl
            
        - target: i686-unknown-linux-musl
          os: ubuntu-latest
          URL: i686-linux-musl
          NAME: dufs-i686-linux-musl
        
        - target: armv7-unknown-linux-musleabihf
          os: ubuntu-latest
          URL: armv7l-linux-musleabihf
          NAME: dufs-armv7-linux-musleabihf

        - target: armv7-unknown-linux-musleabi
          os: ubuntu-latest
          URL: armv7m-linux-musleabi
          NAME: dufs-armv7-linux-musleabi
          
        - target: arm-unknown-linux-musleabihf
          os: ubuntu-latest
          URL: arm-linux-musleabihf
          NAME: dufs-arm-linux-musleabihf

        - target: arm-unknown-linux-musleabi
          os: ubuntu-latest
          URL: arm-linux-musleabi
          NAME: dufs-arm-linux-musleabi

        - target: mipsel-unknown-linux-musl
          os: ubuntu-latest
          URL: mipsel-linux-muslsf
          NAME: dufs-mipsel-linux-muslsf

        - target: mips-unknown-linux-musl
          os: ubuntu-latest
          URL: mips-linux-muslsf
          NAME: dufs-mips-linux-muslsf

        - target: x86_64-unknown-freebsd
          os: ubuntu-latest
          NAME: dufs-x86_64-freebsd

        # transparentlc前端样式的流程
        - target: aarch64-apple-darwin
          os: macos-latest
          NAME: dufs-aarch64-apple-darwin_transparentlc
          
        - target: aarch64-pc-windows-msvc
          os: windows-latest
          NAME: dufs-aarch64-pc-windows-msvc_transparentlc.exe
          
        - target: x86_64-apple-darwin
          os: macos-latest
          NAME: dufs-x86_64-apple-darwin_transparentlc
          
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          NAME: dufs-x86_64-pc-windows-msvc_transparentlc.exe
          
        - target: i686-pc-windows-msvc
          os: windows-latest
          NAME: dufs-i686-pc-windows-msvc_transparentlc.exe
          
        - target: aarch64-unknown-linux-musl
          os: ubuntu-latest
          URL: aarch64-linux-musl
          NAME: dufs-aarch64-linux-musl_transparentlc
          
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          URL: x86_64-linux-musl
          NAME: dufs-x86_64-linux-musl_transparentlc
            
        - target: i686-unknown-linux-musl
          os: ubuntu-latest
          URL: i686-linux-musl
          NAME: dufs-i686-linux-musl_transparentlc
        
        - target: armv7-unknown-linux-musleabihf
          os: ubuntu-latest
          URL: armv7l-linux-musleabihf
          NAME: dufs-armv7-linux-musleabihf_transparentlc

        - target: armv7-unknown-linux-musleabi
          os: ubuntu-latest
          URL: armv7m-linux-musleabi
          NAME: dufs-armv7-linux-musleabi_transparentlc
          
        - target: arm-unknown-linux-musleabihf
          os: ubuntu-latest
          URL: arm-linux-musleabihf
          NAME: dufs-arm-linux-musleabihf_transparentlc

        - target: arm-unknown-linux-musleabi
          os: ubuntu-latest
          URL: arm-linux-musleabi
          NAME: dufs-arm-linux-musleabi_transparentlc

        - target: mipsel-unknown-linux-musl
          os: ubuntu-latest
          URL: mipsel-linux-muslsf
          NAME: dufs-mipsel-linux-muslsf_transparentlc

        - target: mips-unknown-linux-musl
          os: ubuntu-latest
          URL: mips-linux-muslsf
          NAME: dufs-mips-linux-muslsf_transparentlc

        - target: x86_64-unknown-freebsd
          os: ubuntu-latest
          NAME: dufs-x86_64-freebsd_transparentlc

        # cercky前端样式的流程
        - target: aarch64-apple-darwin
          os: macos-latest
          NAME: dufs-aarch64-apple-darwin_cercky
          
        - target: aarch64-pc-windows-msvc
          os: windows-latest
          NAME: dufs-aarch64-pc-windows-msvc_cercky.exe
          
        - target: x86_64-apple-darwin
          os: macos-latest
          NAME: dufs-x86_64-apple-darwin_cercky
          
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          NAME: dufs-x86_64-pc-windows-msvc_cercky.exe
          
        - target: i686-pc-windows-msvc
          os: windows-latest
          NAME: dufs-i686-pc-windows-msvc_cercky.exe
          
        - target: aarch64-unknown-linux-musl
          os: ubuntu-latest
          URL: aarch64-linux-musl
          NAME: dufs-aarch64-linux-musl_cercky
          
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          URL: x86_64-linux-musl
          NAME: dufs-x86_64-linux-musl_cercky
            
        - target: i686-unknown-linux-musl
          os: ubuntu-latest
          URL: i686-linux-musl
          NAME: dufs-i686-linux-musl_cercky
        
        - target: armv7-unknown-linux-musleabihf
          os: ubuntu-latest
          URL: armv7l-linux-musleabihf
          NAME: dufs-armv7-linux-musleabihf_cercky

        - target: armv7-unknown-linux-musleabi
          os: ubuntu-latest
          URL: armv7m-linux-musleabi
          NAME: dufs-armv7-linux-musleabi_cercky
          
        - target: arm-unknown-linux-musleabihf
          os: ubuntu-latest
          URL: arm-linux-musleabihf
          NAME: dufs-arm-linux-musleabihf_cercky

        - target: arm-unknown-linux-musleabi
          os: ubuntu-latest
          URL: arm-linux-musleabi
          NAME: dufs-arm-linux-musleabi_cercky

        - target: mipsel-unknown-linux-musl
          os: ubuntu-latest
          URL: mipsel-linux-muslsf
          NAME: dufs-mipsel-linux-muslsf_cercky

        - target: mips-unknown-linux-musl
          os: ubuntu-latest
          URL: mips-linux-muslsf
          NAME: dufs-mips-linux-muslsf_cercky

        - target: x86_64-unknown-freebsd
          os: ubuntu-latest
          NAME: dufs-x86_64-freebsd_cercky
            
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      URL: ${{ matrix.URL }}
      NAME: ${{ matrix.NAME }}
      TAG: ${{ needs.version.outputs.TAG }}
    steps:
      - name: 设置文件名
        shell: bash
        run: |
          NAME="${MATRIX_NAME}"
          if [[ "$NAME" == *.exe ]]; then
            NAME="${NAME%.exe}"
          fi
          echo "ARTIFACT_NAME=$NAME" >> $GITHUB_ENV
        env:
          MATRIX_NAME: ${{ matrix.NAME }}
          
      - uses: actions/checkout@main
        with:
          repository: sigoden/dufs
          ref: ${{ env.TAG }}
          
      - name: 下载apple-windows工具链
        if: ${{ matrix.TARGET == 'aarch64-apple-darwin' || matrix.TARGET == 'aarch64-pc-windows-msvc' || matrix.TARGET == 'x86_64-apple-darwin' || matrix.TARGET == 'x86_64-pc-windows-msvc' || matrix.TARGET == 'i686-pc-windows-msvc' || matrix.TARGET == 'x86_64-unknown-freebsd' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: 下载apple-windows编译工具
        if: ${{ matrix.TARGET == 'aarch64-apple-darwin' || matrix.TARGET == 'aarch64-pc-windows-msvc' || matrix.TARGET == 'i686-pc-windows-msvc' || matrix.TARGET == 'x86_64-unknown-freebsd' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: 下载linux编译工具
        if: ${{ matrix.TARGET != 'aarch64-apple-darwin' && matrix.TARGET != 'aarch64-pc-windows-msvc' && matrix.TARGET != 'x86_64-apple-darwin' && matrix.TARGET != 'x86_64-pc-windows-msvc' && matrix.TARGET != 'i686-pc-windows-msvc' && matrix.TARGET != 'x86_64-unknown-freebsd' }}
        run: |
          mkdir -p /opt/musl_gcc
          rustup set auto-self-update disable
          echo "下载https://github.com/lmq8267/Toolchain/releases/download/musl-cross/${{ env.URL }}-cross.tgz"
          wget -q -c https://github.com/lmq8267/Toolchain/releases/download/musl-cross/${{ env.URL }}-cross.tgz -P /opt/musl_gcc/
          tar zxf /opt/musl_gcc/${{ env.URL }}-cross.tgz -C /opt/musl_gcc/
          sudo ln -s /opt/musl_gcc/${{ env.URL }}-cross/bin/*gcc /usr/bin/
          sudo apt-get update && sudo apt-get install -qq crossbuild-essential-arm64 crossbuild-essential-armhf musl-tools
          if [[ $TARGET =~ ^mips.*$ ]]; then
            cd "/opt/musl_gcc/${{ env.URL }}-cross/lib/gcc/${{ env.URL }}/11.2.1" || exit 255
            cp libgcc_eh.a libunwind.a
            ar x libgcc.a _ctzsi2.o _clz.o _bswapsi2.o
            ar rcs libctz.a _ctzsi2.o _clz.o _bswapsi2.o

            rustup toolchain install nightly-2026-02-02-x86_64-unknown-linux-gnu
            rustup component add rust-src --toolchain nightly-2026-02-02-x86_64-unknown-linux-gnu
            # https://github.com/rust-lang/rust/issues/128808
            # remove it after Cargo or rustc fix this.
            RUST_LIB_SRC=$HOME/.rustup/toolchains/nightly-x86_64-unknown-linux-gnu/lib/rustlib/src/rust/
            if [[ -f $RUST_LIB_SRC/library/Cargo.lock && ! -f $RUST_LIB_SRC/Cargo.lock ]]; then 
               cp -f $RUST_LIB_SRC/library/Cargo.lock $RUST_LIB_SRC/Cargo.lock
            fi
          else
            rustup target add ${{ env.TARGET }}
          fi
          
          #添加交叉编译配置
          cat >>~/.cargo/config <<EOF
          [target.x86_64-unknown-linux-musl]
          linker = "x86_64-linux-musl-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]
          
          [target.i686-unknown-linux-musl]
          linker = "i686-linux-musl-gcc"
          rustflags = ["-C", "target-feature=+crt-static"] 
          
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-musl-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]
          
          [target.armv7-unknown-linux-musleabi]
          linker = "armv7m-linux-musleabi-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.armv7-unknown-linux-musleabihf]
          linker = "armv7l-linux-musleabihf-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]
          
          [target.arm-unknown-linux-musleabi]
          linker = "arm-linux-musleabi-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.arm-unknown-linux-musleabihf]
          linker = "arm-linux-musleabihf-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.x86_64-pc-windows-msvc]
          rustflags = ["-C", "target-feature=+crt-static"]
          
          [target.i686-pc-windows-msvc]
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.aarch64-pc-windows-msvc]
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.x86_64-apple-darwin]
          rustflags = ["-C", "target-feature=+crt-static"]
          
          [target.aarch64-apple-darwin]
          rustflags = ["-C", "target-feature=+crt-static"]
          
          [target.mipsel-unknown-linux-musl]
          linker = "/opt/musl_gcc/mipsel-linux-muslsf-cross/bin/mipsel-linux-muslsf-gcc"
          rustflags = ["-C", "target-feature=+crt-static",
          "-L", "/opt/musl_gcc/mipsel-linux-muslsf-cross/mipsel-linux-muslsf/lib",
          "-L", "/opt/musl_gcc/mipsel-linux-muslsf-cross/lib/gcc/mipsel-linux-muslsf/11.2.1",
          "-l", "atomic",
          "-l", "ctz",
          "-l", "gcc"]
          
          [target.mips-unknown-linux-musl]
          linker = "/opt/musl_gcc/mips-linux-muslsf-cross/bin/mips-linux-muslsf-gcc"
          rustflags = ["-C", "target-feature=+crt-static",
          "-L", "/opt/musl_gcc/mips-linux-muslsf-cross/mips-linux-muslsf/lib",
          "-L", "/opt/musl_gcc/mips-linux-muslsf-cross/lib/gcc/mips-linux-muslsf/11.2.1",
          "-l", "atomic",
          "-l", "ctz",
          "-l", "gcc"]      
          EOF
      - name: 打印版本信息 (Rust, cargo, GCC)
        shell: bash
        run: |
          rustup -V
          rustup toolchain list
          rustup default
          cargo -V
          rustc -V
      - name: 下载 TransparentLC 前端页面
        if: contains(matrix.NAME, '_transparentlc')
        uses: actions/download-artifact@main
        with:
          name: dufs-transparentlc-assets
          path: dufs-transparentlc-assets
      - name: 替换 TransparentLC 前端页面
        if: contains(matrix.NAME, '_transparentlc')
        shell: bash
        run: |
          cp dufs-transparentlc-assets/index.css assets/index.css
          cp dufs-transparentlc-assets/index.html assets/index.html
          cp dufs-transparentlc-assets/index.js assets/index.js
      - name: 下载 cercky 前端页面
        if: contains(matrix.NAME, '_cercky')
        uses: actions/download-artifact@main
        with:
          name: dufs-cercky-assets
          path: dufs-cercky-assets
      - name: 替换 cercky 前端页面
        if: contains(matrix.NAME, '_cercky')
        shell: bash
        run: |
          cp dufs-cercky-assets/index.css assets/index.css
          cp dufs-cercky-assets/index.html assets/index.html
          cp dufs-cercky-assets/index.js assets/index.js
      - name: 编译dufs
        shell: bash
        run: |
          echo "开始修改 Cargo.toml 写入 thunk-rs 以支持win7..."
          printf '\n[target.x86_64-pc-windows-msvc.build-dependencies]\nthunk-rs = { version = "0.3.3", features = ["win7"] }\n\n[target.i686-pc-windows-msvc.build-dependencies]\nthunk-rs = { version = "0.3.3", features = ["win7"] }\n\n[target.aarch64-pc-windows-msvc.build-dependencies]\nthunk-rs = { version = "0.3.3", features = ["win7"] }\n' >> Cargo.toml
          echo "创建 build.rs 文件..."
          printf '// 配置 thunk-rs 来链接 Windows 7 兼容库，并自动设置链接参数\n#[cfg(target_os = "windows")]\nfn main() {\n    if !std::env::var("TARGET").unwrap_or_default().contains("aarch64") {\n        thunk::thunk();\n    }\n}\n\n#[cfg(not(target_os = "windows"))]\nfn main() {}\n' > build.rs
            
          if [[ $TARGET == 'aarch64-apple-darwin' || $TARGET == 'aarch64-pc-windows-msvc' || $TARGET == 'i686-pc-windows-msvc' || $TARGET == 'x86_64-unknown-freebsd' ]]; then
            echo "编译： cross build --locked --release --target=${{ matrix.target }}"
            cross build --release --target=${{ matrix.target }}
          else
            echo "编译： cargo build --locked --release --target=${{ matrix.target }}"
            if [[ $TARGET =~ ^mips.*$ ]]; then
              cargo +nightly-2026-02-02 build --release --target=${{ matrix.target }} -Z build-std=std,panic_abort
            else
              cargo build --release --target=${{ matrix.target }}
            fi
          fi
            
          cd target/${{ matrix.target }}/release
          mkdir -p ./out
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv ./dufs.exe ./out/${{ matrix.NAME }}
          else
            mv ./dufs ./out/${{ matrix.NAME }}
          fi
          
          ls -alh ./out/
          echo "build_time=$(TZ=UTC-8 date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV
      - name: 安装 UPX
        if: ${{ matrix.TARGET != 'aarch64-apple-darwin' && matrix.TARGET != 'aarch64-pc-windows-msvc' && matrix.TARGET != 'x86_64-apple-darwin' && matrix.TARGET != 'x86_64-pc-windows-msvc' && matrix.TARGET != 'i686-pc-windows-msvc' && matrix.TARGET != 'x86_64-unknown-freebsd' }}
        uses: crazy-max/ghaction-upx@master
        with:
          version: v4.2.4
          install-only: true
      - name: 压缩程序
        if: ${{ matrix.TARGET != 'aarch64-apple-darwin' && matrix.TARGET != 'aarch64-pc-windows-msvc' && matrix.TARGET != 'x86_64-apple-darwin' && matrix.TARGET != 'x86_64-pc-windows-msvc' && matrix.TARGET != 'i686-pc-windows-msvc' && matrix.TARGET != 'x86_64-unknown-freebsd' }}
        run: |
          cd target/${{ matrix.target }}/release/out
          cp ${{ matrix.NAME }} ${{ matrix.NAME }}-upx
          upx --lzma --best ${{ matrix.NAME }}-upx
      - name: 上传程序
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: target/${{ matrix.target }}/release/out/*
          
  summary:
    needs: version
    runs-on: ubuntu-latest
    outputs:
      table: ${{ steps.set_output.outputs.table }}
    env:
      TAG: ${{ needs.version.outputs.TAG }}

    steps:
      - name: 生成 Summary / Release 表格
        id: set_output
        shell: bash
        run: |
          echo "## 🔔 编译结果总览" > summary.md
          echo "" >> summary.md

          echo "## 📦 dufs 多架构文件列表" > release.md
          echo "" >> release.md

          print_group() {

            TITLE="$1"
            shift
  
            echo "<details>" >> summary.md
            echo "<summary><strong>${TITLE}</strong></summary>" >> summary.md
            echo "" >> summary.md

            echo "<details>" >> release.md
            echo "<summary><strong>${TITLE}</strong></summary>" >> release.md
            echo "" >> release.md

            echo "| 架构平台 | [官方原版](https://github.com/sigoden/dufs) | [官方原版](https://github.com/sigoden/dufs)-UPX压缩 | [TransparentLC主题](https://github.com/TransparentLC/dufs-material-assets) | [TransparentLC主题](https://github.com/TransparentLC/dufs-material-assets)-UPX压缩 | [cercky主题](https://github.com/cercky/dufs_web) | [cercky主题](https://github.com/cercky/dufs_web)-UPX压缩 |" >> summary.md
            echo "|---|---|---|---|---|---|---|" >> summary.md

            echo "| 架构平台 | [官方原版](https://github.com/sigoden/dufs) | [官方原版](https://github.com/sigoden/dufs)-UPX压缩 | [TransparentLC主题](https://github.com/TransparentLC/dufs-material-assets) | [TransparentLC主题](https://github.com/TransparentLC/dufs-material-assets)-UPX压缩 | [cercky主题](https://github.com/cercky/dufs_web) | [cercky主题](https://github.com/cercky/dufs_web)-UPX压缩 |" >> release.md
            echo "|---|---|---|---|---|---|---|" >> release.md

            for ARCH in "$@"; do

              # ========= 基础文件 =========
              if [[ "$ARCH" == *.exe ]]; then
                BASE_ARCH="${ARCH%.exe}"

                RAW="dufs-${BASE_ARCH}.exe"
                RAW_UPX="dufs-${BASE_ARCH}-upx.exe"

                T1="dufs-${BASE_ARCH}_transparentlc.exe"
                T1_UPX="dufs-${BASE_ARCH}_transparentlc-upx.exe"

                T2="dufs-${BASE_ARCH}_cercky.exe"
                T2_UPX="dufs-${BASE_ARCH}_cercky-upx.exe"
              else
                RAW="dufs-${ARCH}"
                RAW_UPX="dufs-${ARCH}-upx"

                T1="dufs-${ARCH}_transparentlc"
                T1_UPX="dufs-${ARCH}_transparentlc-upx"

                T2="dufs-${ARCH}_cercky"
                T2_UPX="dufs-${ARCH}_cercky-upx"
              fi

              BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

              # ========= URL =========
              URL_RAW="${BASE_URL}/${RAW}"
              URL_RAW_UPX="${BASE_URL}/${RAW_UPX}"

              URL_T1="${BASE_URL}/${T1}"
              URL_T1_UPX="${BASE_URL}/${T1_UPX}"

              URL_T2="${BASE_URL}/${T2}"
              URL_T2_UPX="${BASE_URL}/${T2_UPX}"

              # ========= UPX 判断（统一规则）=========
              if [[ "$ARCH" == *apple-darwin* || "$ARCH" == *pc-windows-msvc* || "$ARCH" == *freebsd* ]]; then
                RAW_UPX_SUM="-"
                T1_UPX_SUM="-"
                T2_UPX_SUM="-"

                RAW_UPX_REL="-"
                T1_UPX_REL="-"
                T2_UPX_REL="-"
              else
                RAW_UPX_SUM="dufs-${ARCH}-upx"
                T1_UPX_SUM="dufs-${ARCH}_transparentlc-upx"
                T2_UPX_SUM="dufs-${ARCH}_cercky-upx"

                #RAW_UPX_REL="[📥下载](${URL_RAW_UPX})"
                #T1_UPX_REL="[📥下载](${URL_T1_UPX})"
                #T2_UPX_REL="[📥下载](${URL_T2_UPX})"
                RAW_UPX_REL="[📥下载](${URL_RAW_UPX})"
                T1_UPX_REL="[📥下载](${URL_T1_UPX})"
                T2_UPX_REL="[📥下载](${URL_T2_UPX})"
              fi

              # ========= summary 表 =========
              echo "| ${ARCH} | ${RAW} | ${RAW_UPX_SUM} | ${T1} | ${T1_UPX_SUM} | ${T2} | ${T2_UPX_SUM} |" >> summary.md

              # ========= release 表 =========
              echo "| ${ARCH} | [📥下载](${URL_RAW}) | ${RAW_UPX_REL} | [📥下载](${URL_T1}) | ${T1_UPX_REL} | [📥下载](${URL_T2}) | ${T2_UPX_REL} |" >> release.md

            done

            echo "" >> summary.md
            echo "</details>" >> summary.md
            echo "" >> summary.md

            echo "" >> release.md
            echo "</details>" >> release.md
            echo "" >> release.md
          }

          print_group "🐧 Linux 平台" \
            aarch64-linux-musl \
            x86_64-linux-musl \
            i686-linux-musl \
            armv7-linux-musleabihf \
            armv7-linux-musleabi \
            arm-linux-musleabihf \
            arm-linux-musleabi \
            mipsel-linux-muslsf \
            mips-linux-muslsf

          print_group "🍎 macOS 平台" \
            aarch64-apple-darwin \
            x86_64-apple-darwin

          print_group "🪟 Windows 平台" \
            aarch64-pc-windows-msvc.exe \
            x86_64-pc-windows-msvc.exe \
            i686-pc-windows-msvc.exe

          print_group "🐡 BSD 平台" \
            x86_64-freebsd
            
          echo "" >> summary.md
          echo "## 🎨 前端资源包" >> summary.md
          echo "" >> summary.md
          echo "- assets-pack（包含两个第三方的完整主题包 assets）" >> summary.md
          echo "" >> summary.md
          echo "----" >> summary.md
          echo "" >> summary.md
          echo "⏱ 请等待构建完成后刷新页面下载文件" >> summary.md
          echo "## 🎨 前端资源包" >> release.md
          echo "" >> release.md
          echo "- [📥 TransparentLC 完整前端 assets](https://github.com/${{ github.repository }}/releases/download/${TAG}/dufs-assets-transparentlc.tar.gz)" >> release.md
          echo "- [📥 Cercky 完整前端 assets](https://github.com/${{ github.repository }}/releases/download/${TAG}/dufs-assets-cercky.tar.gz)" >> release.md
          echo "" >> release.md
          echo "----" >> release.md
          echo "" >> release.md

          cat summary.md >> $GITHUB_STEP_SUMMARY

          echo "table<<EOF" >> $GITHUB_OUTPUT
          cat release.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
  release:
    needs:
     - build-dufs
     - summary
     - package-assets
     - version
    env:
      TAG: ${{ needs.version.outputs.TAG }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@main

      - name: 下载已上传的文件
        uses: actions/download-artifact@main
        with:
         path: dufs_files

      - name: 设置构建时间
        run: |
         mkdir -p release
         sudo timedatectl set-timezone "Asia/Shanghai"
         # 遍历下载的每个 artifact 子文件夹，把里面的二进制移动到 release/
         for dir in dufs_files/*; do
          if [ -d "$dir" ]; then
            rm -f "$dir/index.css" "$dir/index.html" "$dir/index.js" "$dir/vite.svg" || true
            mv "$dir"/* release/ 2>/dev/null || true
          fi
         done
         echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: 发布
        uses: softprops/action-gh-release@v2
        with:
            token: ${{ github.token }}
            body: |
             > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-8267?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.TAG }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github) 

             ${{ needs.summary.outputs.table }}

             ### 📦 说明

             - [官方原版](https://github.com/sigoden/dufs)：官方界面
             - [TransparentLC](https://github.com/TransparentLC/dufs-material-assets)：主题1美化版
             - [Cercky](https://github.com/cercky/dufs_web)：主题2美化版
             - UPX压缩：程序的体积更小，但会占用更多运行内存。
             - 所有版本均为GitHub CI自动构建。

             ### 🔗 相关项目

             - 官方项目：https://github.com/sigoden/dufs
             - 前端主题1 ：https://github.com/TransparentLC/dufs-material-assets
             - 前端主题2 ：https://github.com/cercky/dufs_web
             - 版本更新说明：https://github.com/sigoden/dufs/releases
 

              ${{ github.event.inputs.info }}
              
            tag_name: ${{ env.TAG }}
            files: release/*
  keepalive-workflow:
    # github超过60天未提交将自动停止工作流
    name: 工作流保活 
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@main
      #- uses: gautamkrishnar/keepalive-workflow@v2
        #with:
          #use_api: true
      - name: 检查上次提交日期
        id: check_commit_date
        run: |
          # 获取上次提交日期（格式：YYYY-MM-DD）
          LAST_COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          echo "上次提交日期: $LAST_COMMIT_DATE"
          # 计算当前日期和上次提交日期的差值（单位：天）
          LAST_COMMIT_TIMESTAMP=$(date -d "$LAST_COMMIT_DATE" +%s)
          CURRENT_TIMESTAMP=$(date +%s)
          DIFF_DAYS=$(( (CURRENT_TIMESTAMP - LAST_COMMIT_TIMESTAMP) / 86400 ))
          echo "距离上次提交以来的天数: $DIFF_DAYS"
          echo "diff_days=$DIFF_DAYS" >> $GITHUB_ENV
      - name: 执行空提交
        if: ${{ env.diff_days > 50 }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 创建空提交
          git commit --allow-empty -m "自动空提交，保持仓库活跃"
          git push
